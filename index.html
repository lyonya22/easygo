<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazy Go | Feel the Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0510; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-glow { text-shadow: 0 0 20px rgba(168, 85, 247, 0.8); }
        
        /* Стили прелоадера */
        #loader {
            position: fixed;
            inset: 0;
            background: #0a0510;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-content {
            text-align: center;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); filter: blur(2px); }
            50% { opacity: 1; transform: scale(1); filter: blur(0px); }
        }

        /* Убираем скролл, пока грузится */
        .loaded body { overflow-y: auto; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="loader">
        <div class="loader-content">
            <div class="text-5xl font-black italic tracking-tighter uppercase text-glow">Eazy Go</div>
            <div class="w-48 h-[2px] bg-white/10 mt-4 overflow-hidden relative">
                <div class="absolute inset-0 bg-purple-600 animate-[loading_2s_infinite]"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>

    <div id="main-content">
        <nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center bg-black/50 backdrop-blur-lg border-b border-white/5">
            <div class="text-2xl font-black italic tracking-tighter uppercase">Eazy Go</div>
            <div class="space-x-8 hidden md:block text-xs font-bold uppercase tracking-widest">
                <a href="#hero" class="hover:text-purple-500 transition">Старт</a>
                <a href="#prices" class="hover:text-purple-500 transition">Тарифы</a>
                <a href="#contact" class="hover:text-purple-500 transition">Контакты</a>
            </div>
            <a href="tel:+77008088060" class="px-5 py-2 bg-purple-600 rounded-full text-xs font-black uppercase hover:bg-purple-500 transition shadow-lg shadow-purple-900/40">Арендовать</a>
        </nav>

        <section id="hero" class="relative min-h-screen flex flex-col justify-center items-center px-4 pt-20">
            <div class="absolute w-[600px] h-[600px] bg-purple-600/20 rounded-full blur-[120px] -z-10"></div>
            
            <h1 class="text-7xl md:text-[10rem] font-black italic uppercase tracking-tighter leading-none text-center" data-aos="zoom-in">
                RIDE <span class="text-transparent bg-clip-text bg-gradient-to-b from-purple-400 to-purple-800 text-glow italic">EAZY</span>
            </h1>
            
            <div class="max-w-4xl w-full mt-[-50px] md:mt-[-100px]" data-aos="fade-up" data-aos-delay="500">
                <img src="bike.jpg" alt="Eazy Go" class="w-full drop-shadow-[0_35px_50px_rgba(107,33,168,0.5)] transform hover:scale-105 transition duration-1000">
            </div>
        </section>

        </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Инициализация анимаций скролла
        AOS.init({ duration: 1200, once: false });

        // Скрипт для прелоадера
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                document.documentElement.classList.add('loaded');
                document.body.style.overflowY = 'auto'; // Включаем скролл после загрузки
            }, 1500); // Задержка 1.5 сек для красоты
        });
    </script>
</body>
</html>
